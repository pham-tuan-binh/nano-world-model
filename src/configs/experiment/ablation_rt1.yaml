defaults:
  - default

# Phase 1 ablation on RT-1 fractal. 8 GPU × bs=8 → eff_bs=64.
# 50K steps = 3.2M samples ≈ 0.91 epoch of ~3.52M train slices.
# Enough to discriminate:
#   - pred_target ∈ {epsilon, v, x}  (diverges within ~10-20K steps)
#   - action_injection ∈ {additive, adaln_fuse, adaln, film, cross_attention}
#     (diverges within ~30-50K steps on 7-dim continuous action)
# 8 runs × ~2.3h ≈ 18h total wall on 8 GPU.
training:
  max_steps: 50000
  batch_size: 8

infra:
  # RT-1 av1 video decode is CPU-bound; 16 workers/GPU × 8 GPU keeps GPUs fed.
  num_workers: 16
