defaults:
  - rt1/base

name: "rt1"
frame_interval: 1  # RT-1 is 3 FPS, no frame skipping

loader:
  # LeRobot HuggingFace dataset (v2.0). `data_path` is the repo_id;
  # `root` points to a local mirror (download-time cache or a manual
  # copy). Set RT1_DATA_ROOT to override the local path.
  data_path: "IPEC-COMMUNITY/fractal20220817_data_lerobot"
  root: "${oc.env:RT1_DATA_ROOT,./data/rt1_fractal}"
  image_key: "observation.images.image"
  normalize_action: True
  train_slice_mode: "random"     # 87K episodes, random sampling for efficiency
  val_slice_mode: "exhaustive"

spec:
  action_dim: 7
